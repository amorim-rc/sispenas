<!--
  SISPENAS — marca provisória.

  Uma balança cuja travessa é também uma régua graduada: o instrumento de pesar
  (justiça) sobre o instrumento de medir (dosimetria). As marcas da travessa são
  a escala da pena — o intervalo entre mínimo e máximo é o objeto central da
  pesquisa.

  `currentColor` faz a marca herdar a cor do tema (claro/escuro) da navbar.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32"
     fill="none" stroke="currentColor" stroke-width="1.6"
     stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="SISPENAS">
  <!-- Haste e base -->
  <path d="M16 8v18" />
  <path d="M11.5 26h9" />
  <!-- Travessa graduada: as marcas são a escala da pena -->
  <path d="M5 11h22" />
  <path d="M5 9.4v3.2M10.5 10.2v2M16 9.4v3.2M21.5 10.2v2M27 9.4v3.2" />
  <!-- Fiéis -->
  <path d="M5 11l-3 6M5 11l3 6" />
  <path d="M27 11l-3 6M27 11l3 6" />
  <!-- Pratos -->
  <path d="M1 17h8a4 4 0 0 1-8 0Z" />
  <path d="M23 17h8a4 4 0 0 1-8 0Z" />
  <!-- Fulcro -->
  <circle cx="16" cy="6.4" r="1.6" />
</svg>

<!--
  Favicon SISPENAS.

  Versão reduzida da marca: aos 16px a travessa graduada e os fiés viram borrão,
  então restam a balança essencial e um fundo sólido — que garante contraste
  tanto em abas claras quanto escuras, onde `currentColor` não se aplica.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32"
     role="img" aria-label="SISPENAS">
  <rect width="32" height="32" rx="7" fill="#1e40af" />
  <g fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Haste e base -->
    <path d="M16 9.5v14" />
    <path d="M12 23.5h8" />
    <!-- Travessa: três marcas bastam para sugerir a escala -->
    <path d="M6.5 11.5h19" />
    <path d="M6.5 10.2v2.6M16 10.2v2.6M25.5 10.2v2.6" />
    <!-- Pratos -->
    <path d="M3 16.5h7a3.5 3.5 0 0 1-7 0Z" />
    <path d="M22 16.5h7a3.5 3.5 0 0 1-7 0Z" />
  </g>
</svg>

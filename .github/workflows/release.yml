name: Publicar Release

# Publicação AUTOMÁTICA: quando um push na main traz uma versão nova em
# package.json (para a qual ainda não há Release), cria a Release do GitHub e a
# tag vX.Y.Z usando o texto de release-notes/*-vX.Y.Z.md.
#
# Assim, fechar uma versão é só: subir a versão no package.json + escrever a
# release note, e mergear. Sem `git push origin vX.Y.Z` manual (que já bagunçou
# uma vez). É idempotente: se a Release da versão corrente já existe, não faz nada.
#
# `workflow_dispatch` permite re-rodar à mão (ex.: depois de apagar uma Release
# malformada) sem precisar de um novo commit.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Versão, release note e título
        id: rn
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "existe=1" >> "$GITHUB_OUTPUT"
            echo "Release $TAG já existe — nada a publicar."
            exit 0
          fi
          echo "existe=0" >> "$GITHUB_OUTPUT"
          # Os arquivos usam a versão com PONTOS (release-notes/...-v1.1.1.md).
          FILE="$(ls release-notes/*-"${TAG}".md 2>/dev/null | head -1)"
          if [ -z "$FILE" ]; then
            echo "titulo=$TAG" >> "$GITHUB_OUTPUT"
            printf 'Release %s.\n' "$TAG" > corpo.md
            echo "::warning::Sem release note para $TAG (release-notes/*-$TAG.md) — corpo mínimo."
          else
            TITULO="$(sed -n 's/^title:[[:space:]]*//p' "$FILE" | head -1 | sed 's/^"//; s/"$//')"
            echo "titulo=${TITULO:-$TAG}" >> "$GITHUB_OUTPUT"
            # Corpo: tudo após o frontmatter (2º `---`), sem o marcador de truncamento.
            awk 'BEGIN{fm=0} /^---[[:space:]]*$/{fm++; next} fm>=2{print}' "$FILE" \
              | sed '/{\/\* truncate \*\/}/d' > corpo.md
          fi

      - name: Criar a Release (cria também a tag no commit atual)
        if: steps.rn.outputs.existe == '0'
        run: |
          gh release create "${{ steps.rn.outputs.tag }}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.rn.outputs.titulo }}" \
            --notes-file corpo.md

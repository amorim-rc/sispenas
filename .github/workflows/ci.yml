name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Typecheck, verificação e build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: npm ci

      # Regenera o derivado e falha se o catálogo tiver MAIS contradições do que o
      # débito conhecido (0 — todas resolvidas). O catálogo pode melhorar, não
      # piorar. Ao resolver contradições, baixe --max-contradicoes na mesma medida.
      # Também impõe: todo registro é tipo penal, e todo id é único e append-only.
      - name: Validar catálogo de tipos penais
        run: python3 scripts/transform_data.py --estrito --max-contradicoes=0

      # O derivado é commitado; se a transformação mudar o resultado, o PR está
      # desatualizado (o workflow regen-data.yml o regenera após o merge).
      - name: Conferir se static/data/crimes.json está atualizado
        run: git diff --exit-code --stat static/data/crimes.json

      - name: Typecheck
        run: npm run typecheck

      # Invariantes do motor de benefícios + casos-âncora de direito penal,
      # avaliados contra o catálogo real de tipos penais.
      - name: Verificar motor de benefícios
        run: npm run verificar

      - name: Build
        run: npm run build
